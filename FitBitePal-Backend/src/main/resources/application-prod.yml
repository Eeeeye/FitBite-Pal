# FitBite Pal Backend - 生产环境配置
# 使用: java -jar app.jar --spring.profiles.active=prod

spring:
  application:
    name: fitbitepal-backend
  
  # 数据库配置 (使用环境变量)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fitbitepal?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:fitbitepal}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA配置 (生产环境)
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境只验证，不自动修改表结构
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:10000}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2s

  # 邮件服务
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_HOST:smtp.qq.com}
            protocols: TLSv1.2 TLSv1.3
          timeout: 15000
          connectiontimeout: 15000
          writetimeout: 15000

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 10000
  
# JWT配置 (生产环境必须使用强密钥)
jwt:
  secret: ${JWT_SECRET}  # 必须通过环境变量设置
  expiration: ${JWT_EXPIRATION:86400000}

# 日志配置 (生产环境)
logging:
  level:
    root: WARN
    com.fitbitepal.backend: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    name: ${LOG_PATH:/var/log/fitbitepal}/application.log
    max-size: 100MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 跨域配置 (生产环境限制来源)
cors:
  allowed-origins: 
    - ${CORS_ALLOWED_ORIGINS:https://fitbitepal.com}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

app:
  security:
    verification-code:
      length: ${VERIFICATION_CODE_LENGTH:6}
      ttl-minutes: ${VERIFICATION_CODE_TTL_MINUTES:5}
    mail:
      from: ${MAIL_FROM}
  
  # AI 服务配置
  ai:
    enabled: ${AI_ENABLED:true}
    model-scope:
      api-key: ${MODELSCOPE_API_KEY}
      endpoint: ${MODELSCOPE_ENDPOINT:https://api.modelscope.cn}
      timeout: ${AI_TIMEOUT:30000}
  
  # 姿态识别配置
  pose:
    enabled: ${POSE_ENABLED:true}
    use-ai: ${POSE_USE_AI:true}
    model-path: ${POSE_MODEL_PATH:}
    frame-rate: ${POSE_FRAME_RATE:2}

# ModelScope AI 配置
modelscope:
  api:
    base-url: ${MODELSCOPE_BASE_URL:https://api-inference.modelscope.cn/v1}
    key: ${MODELSCOPE_API_KEY}
    model: ${MODELSCOPE_MODEL:Qwen/Qwen3-VL-8B-Instruct}
    enabled: ${MODELSCOPE_ENABLED:true}

# Actuator 健康检查端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    redis:
      enabled: true

