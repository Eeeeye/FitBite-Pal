# FitBitePal 开发环境配置
# 包含QQ邮箱SMTP配置

spring:
  # 数据库配置（继承自主配置文件）
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fitbitepal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  # Redis配置（继承自主配置文件）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  
  # ✨ QQ邮箱SMTP配置
  mail:
    host: smtp.qq.com
    port: 587  # 使用STARTTLS端口
    username: 3030478174@qq.com
    password: wzzgjohbsbzzdebi  # QQ邮箱授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.qq.com  # 信任QQ邮箱服务器
            protocols: TLSv1.2 TLSv1.3
          timeout: 15000
          connectiontimeout: 15000
          writetimeout: 15000
    test-connection: false  # 启动时不测试连接，避免启动失败

# 应用配置
app:
  security:
    # 验证码配置
    verification-code:
      length: 6
      ttl-minutes: 5
    # 邮件发送配置
    mail:
      from: 3030478174@qq.com
  
  # AI服务配置
  ai:
    enabled: ${AI_ENABLED:true}  # 开发环境默认启用AI
    ark:
      api-key: ${ARK_API_KEY:}
      endpoint: ${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/coding/v3}
      timeout: ${AI_TIMEOUT:30000}

# 日志配置（开发环境）
logging:
  level:
    root: INFO
    com.fitbitepal.backend: DEBUG
    org.springframework.mail: DEBUG  # 开启邮件调试日志
